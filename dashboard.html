<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Css Styles link  -->
    <link rel="stylesheet" href="./style/style.css" />
    <!-- Css Tailwind link Here -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI Cdn link Here -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts Link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <!-- NavBar Started here -->
      <nav
        class="fixed w-full z-20 top-0 left-0 border-b border-gray-200 bg-white"
      >
        <div class="navbar bg-base-100 shadow-sm">
          <div class="flex-1">
            <a href="/dashboard.html">
              <div class="flex items-center gap-2">
                <img width="70" src="./assets/github-logo.png" alt="Logo" />
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
              </div>
            </a>
          </div>
          <div class="flex gap-2 justify-center items-center">
            <input
              id="search-input"
              type="text"
              placeholder="Search"
              class="input input-bordered w-24 md:w-auto"
            />
            <div>
              <div>
                <button id="search-button" class="btn btn-primary">
                  Search
                </button>
              </div>
            </div>
          </div>
        </div>
      </nav>
      <!-- Navbar ended here -->
        
    </header>
    <!-- Main Content started here  -->
    <main class="max-w-7xl mx-auto mt-10">
      <!-- category section Started here -->
      <section class="sticky top-20 bg-white z-10">
        <div
          id="category-container"
          class="flex gap-3 bg-base-100 shadow-sm px-12"
        >
          <!-- category here -->
        </div>
      </section>
      <!-- category section ends here -->

      <div
        id="loading-spinner"
        class="flex mt-56 font-bold text-2xl justify-center my-10 gap-8 hidden"
      >
        <span class="loading loading-bars loading-xs"></span>
        <span class="loading loading-bars loading-sm"></span>
        <span class="loading loading-bars loading-md"></span>
        <span class="loading loading-bars loading-lg"></span>
        <span class="loading loading-bars loading-xl"></span>
      </div>
       <!-- issue counter card her -->

      <section class="mt-16">
          <div class="card bg-base-100 card-xl shadow-sm">
      <div class="card-body">
        <div class="flex gap-6 items-center">
          <div>
            <img class="p-1 rounded-full bg-sky-200" src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2 class="card-title"><span id="issue-count">0</span> <span>Issues</span> </h2>
            <p>
              Track and manage your project issues
            </p>
          </div>
        </div>
        
      </div>
    </div>
      </section>
       <!-- issue counter card ends her -->

      <!-- Card Section Started here -->
      <section
        id="card-container"
        class="grid grid-cols-1 md:grid-cols-3 gap-6 my-6 mt-24"
      >
        <!--  Dynamic card here -->
      </section>
      <!-- Card Section ends here -->
    </main>
    <!-- Main Content Ends here  -->

    <!-- Footer started here -->
  
    <!-- Footer Ends here -->
    <!-- JavaScript Link Here -->
    <script src="./javaScript/script.js"></script>
  </body>
</html>
