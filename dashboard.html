<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Css Styles link  -->
    <link rel="stylesheet" href="./style/style.css" />
    <!-- Css Tailwind link Here -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI Cdn link Here -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts Link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NavBar Started here -->
    <nav class="sticky top-0 z-50 my-0">
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <a href="/dashboard.html">
            <div class="flex items-center gap-2">
              <img width="70" src="./assets/github-logo.png" alt="Logo" />
              <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            </div>
          </a>
        </div>
        <div class="flex gap-2 justify-center items-center">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />
          <div>
            <div>
              <button class="btn btn-primary">Search</button>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <!-- Navbar ended here -->
    <!-- Main Content started here  -->
    <main class="max-w-7xl mx-auto">
      <!-- category section Started here -->
      <section class="mb-6 sticky top-[7rem] z-10">
        <div
          id="category-container"
          class="flex gap-3 my-6 bg-base-100 shadow-sm px-12"
        >
          <!-- category here -->
        </div>
      </section>
      <!-- category section ends here -->

      
      <!-- Card Section Started here -->
      <section id="card-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 my-6">

        <!--  Dynamic card here -->
      </section>
      <!-- Card Section ends here -->
    </main>
    <!-- Main Content Ends here  -->
    <!-- JavaScript Link Here -->
    <script src="./javaScript/script.js"></script>
  </body>
</html>
