<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Issue</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Css Styles link  -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <!-- Css Tailwind link Here -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI Cdn link Here -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts Link  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  </head>
  <body>
    <!-- Log ing Form Card Here -->
    <section class="mx-auto max-w-xl  card bg-base-100 shadow-lg my-6">
      <div class="">
        <figure class="px-10 pt-10">
          <img src="./assets/github-logo.png" alt="Shoes" class="rounded-xl" />
        </figure>
        <div class="card-body items-center text-center">
          <h2 class="card-title text-xl font-bold">GitHub Issues Tracker</h2>
          <p>Sign in to manage your issues</p>
          
        </div>
      </div>
      <form >
        <fieldset class="fieldset flex flex-col gap-4 p-10 items-center">
          <label class="label">Username:</label>
          <input id="user-name" type="text" class="input" placeholder="Username" />



          <label class="label">Password:</label>
          <input id="password" type="password" class="input" placeholder="Password" />
          
          <h4 id="login-error" class="text-red-500 h-5 text-xl"></h4>
          <button onclick="loginDataSubmit()" type="button" class="btn btn-wide btn-primary hover:btn-active  mt-4   hover:text-white ">Login</button>
          <div><p class="link link-hover">Username: admin <br>
Password: admin123</p></div>
        </fieldset>
      </form>
    </section>
    <!-- JavaScript Login File -->
     <script src="./javaScript/login.js"></script>
  </body>
</html>
